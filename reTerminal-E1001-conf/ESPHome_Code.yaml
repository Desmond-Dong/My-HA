number:
  - platform: template
    name: "Sleep Noise Threshold"
    id: sleep_noise_threshold
    entity_category: config
    optimistic: true
    restore_value: true
    min_value: 20
    max_value: 90
    step: 1
    initial_value: 48
  - platform: template
    name: "Sleep Adaptive Margin"
    id: sleep_adaptive_margin
    entity_category: config
    optimistic: true
    restore_value: true
    min_value: 3
    max_value: 30
    step: 1
    initial_value: 8
  - platform: template
    name: "Sleep Baseline Follow"
    id: sleep_baseline_follow
    entity_category: config
    optimistic: true
    restore_value: true
    min_value: 0.01
    max_value: 0.30
    step: 0.01
    initial_value: 0.08

binary_sensor:
  - platform: template
    name: "Sleep Noise Event"
    id: sleep_noise_event
    device_class: sound
    lambda: |-
      if (!id(sleep_monitoring).state) {
        return false;
      }
      if (!id(sleep_rms_loudness).has_state()) {
        return false;
      }
      float threshold = id(sleep_noise_threshold).state;
      if (id(sleep_adaptive_threshold).state && id(sleep_noise_floor_initialized)) {
        const float adaptive_threshold = id(sleep_noise_floor_db) + id(sleep_adaptive_margin).state;
        if (adaptive_threshold > threshold) {
          threshold = adaptive_threshold;
        }
      }
      return id(sleep_rms_loudness).state >= threshold;
    filters:
      - delayed_on: 800ms
      - delayed_off: 1500ms
    on_press:
      - lambda: |-
          id(sleep_noise_active) = true;
          id(sleep_noise_started_ms) = millis();
          id(sleep_noise_event_count) += 1;
    on_release:
      - lambda: |-
          if (id(sleep_noise_active)) {
            id(sleep_noise_total_ms) += millis() - id(sleep_noise_started_ms);
            id(sleep_noise_active) = false;
          }
  - platform: gpio    # Next page
    pin:
      number: GPIO3
      mode: INPUT_PULLUP
      inverted: true
    id: key1
    name: "Key1"
  - platform: gpio     # Prev page
    pin:
      number: GPIO4
      mode: INPUT_PULLUP
      inverted: true
    id: key2
    name: "Key2"
    filters:
      - delayed_on: 30ms
      - delayed_off: 30ms
    on_press:
      - lambda: |-
          id(sleep_noise_event_count) = 0;
          id(sleep_noise_total_ms) = 0;
          id(sleep_noise_started_ms) = millis();
          id(sleep_noise_active) = false;
      - logger.log: "Sleep stats reset"

  - platform: gpio     # Key3 物理刷新按键
    pin:
      number: GPIO5
      mode: INPUT_PULLUP
      inverted: true
    id: key3
    name: "Key3"
    on_press:
      - component.update: dashboard_image
          

