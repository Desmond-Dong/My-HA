#    output: bsp_led
#    id: onboard_led
  - platform: monochromatic
    output: buzzer_pwm
    icon: "mdi:volume-high"
    name: "Buzzer"
    id: buzzer
    # Setting transition length to 0s makes the buzzer turn on and off instantly.
    default_transition_length: 0s
switch:
  - platform: template
    name: "Refresh"
    id: refresh_display
    turn_on_action:
      - lambda: |-
          id(dashboard_image).set_url(id(custom_url_input).state);
          id(dashboard_image).update();
          
      - delay: 500ms
      - switch.turn_off: refresh_display
  - platform: template
    name: "Sleep Monitoring"
    id: sleep_monitoring
    optimistic: true
    restore_mode: RESTORE_DEFAULT_ON
    entity_category: config
    turn_on_action:
      - lambda: |-
          id(sleep_noise_event_count) = 0;
          id(sleep_noise_total_ms) = 0;
          id(sleep_noise_started_ms) = millis();
          id(sleep_noise_active) = false;
          id(sleep_noise_floor_initialized) = false;
          id(sleep_noise_floor_db) = 0.0f;
      - logger.log: "Sleep monitoring armed"
    turn_off_action:
      - lambda: |-
          if (id(sleep_noise_active)) {
            id(sleep_noise_total_ms) += millis() - id(sleep_noise_started_ms);
            id(sleep_noise_active) = false;
          }
      - logger.log: "Sleep monitoring disarmed"
  - platform: template
    name: "Sleep Adaptive Threshold"
    id: sleep_adaptive_threshold
    optimistic: true
    restore_mode: RESTORE_DEFAULT_ON
    entity_category: config
#  - platform: template
#    name: "Force Deep Sleep"
#    turn_on_action:
#      - logger.log:
#          format: "进入休眠 %d 分钟"
#          args: [ 'id(sleep_minutes)' ]
#      - deep_sleep.enter:
