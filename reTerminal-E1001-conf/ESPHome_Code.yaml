time:
  - platform: homeassistant
    id: ha_time

globals:
  - id: sleep_noise_event_count
    type: int
    restore_value: no
    initial_value: '0'
  - id: sleep_noise_total_ms
    type: uint32_t
    restore_value: no
    initial_value: '0'
  - id: sleep_noise_started_ms
    type: uint32_t
    restore_value: no
    initial_value: '0'
  - id: sleep_noise_active
    type: bool
    restore_value: no
    initial_value: 'false'
  - id: sleep_noise_floor_db
    type: float
    restore_value: no
    initial_value: '0.0'
  - id: sleep_noise_floor_initialized
    type: bool
    restore_value: no
    initial_value: 'false'

interval:
  - interval: 10s
    then:
      - lambda: |-
          if (!id(sleep_monitoring).state) {
            return;
          }
          if (!id(sleep_rms_loudness).has_state()) {
            return;
          }
          if (id(sleep_noise_active)) {
            return;
          }

          const float rms = id(sleep_rms_loudness).state;
          if (!id(sleep_noise_floor_initialized)) {
            id(sleep_noise_floor_db) = rms;
            id(sleep_noise_floor_initialized) = true;
            return;
          }

          const float alpha = id(sleep_baseline_follow).state;
          id(sleep_noise_floor_db) = id(sleep_noise_floor_db) + ((rms - id(sleep_noise_floor_db)) * alpha);

