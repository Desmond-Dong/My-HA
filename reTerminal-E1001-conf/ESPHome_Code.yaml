#    id: bsp_sd_enable
  - platform: gpio
    pin: GPIO21
    id: bsp_battery_enable
  - platform: ledc   # CORRECTED: 'ledc' is the correct platform for ESP32 PWM.
    pin: GPIO45
    id: buzzer_pwm
    # The frequency determines the pitch of the buzzer's sound. 1000Hz is a mid-range tone.
