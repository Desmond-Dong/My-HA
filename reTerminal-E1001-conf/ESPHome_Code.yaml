sensor:
  - platform: sht4x
    temperature:
      name: "Temperature"
      id: temp_sensor
    humidity:
      name: "Humidity"
      id: hum_sensor
  - platform: wifi_signal
    name: "Wi-Fi Signal"
    id: wifi_signal1
    update_interval: 60s
  - platform: adc
    pin: GPIO1
    name: "Battery Voltage"
    id: battery_voltage
    update_interval: 60s
    attenuation: 12db
    filters:
      - multiply: 2.0
  - platform: template
    name: "Battery Level"
    id: battery_level
    unit_of_measurement: "%"
    icon: "mdi:battery"
    device_class: battery
    state_class: measurement
    lambda: 'return id(battery_voltage).state;'
    update_interval: 60s
    filters:
      - calibrate_linear:
          - 4.15 -> 100.0
          - 3.96 -> 90.0
          - 3.91 -> 80.0
          - 3.85 -> 70.0
          - 3.80 -> 60.0
          - 3.75 -> 50.0
          - 3.68 -> 40.0
          - 3.58 -> 30.0
          - 3.49 -> 20.0
          - 3.41 -> 10.0
          - 3.30 -> 5.0
          - 3.27 -> 0.0
      - clamp:
          min_value: 0
          max_value: 100
  - platform: debug
    free:
      name: "Free Heap"
    block:
      name: "Max Free Block"
    loop_time:
      name: "Loop Time"
  - platform: template
    name: "Sleep Noise Events"
    id: sleep_noise_events
    unit_of_measurement: "events"
    accuracy_decimals: 0
    lambda: |-
      return id(sleep_noise_event_count);
    update_interval: 10s
  - platform: template
    name: "Sleep Noise Minutes"
    id: sleep_noise_minutes
    unit_of_measurement: "min"
    accuracy_decimals: 1
    lambda: |-
      uint32_t total_ms = id(sleep_noise_total_ms);
      if (id(sleep_noise_active)) {
        total_ms += millis() - id(sleep_noise_started_ms);
      }
      return total_ms / 60000.0f;
    update_interval: 10s
  - platform: template
    name: "Sleep Score"
    id: sleep_score
    unit_of_measurement: "%"
    accuracy_decimals: 0
    icon: "mdi:sleep"
    lambda: |-
      uint32_t total_ms = id(sleep_noise_total_ms);
      if (id(sleep_noise_active)) {
        total_ms += millis() - id(sleep_noise_started_ms);
      }
      const float noise_minutes = total_ms / 60000.0f;
      float score = 100.0f - (id(sleep_noise_event_count) * 2.0f) - (noise_minutes * 1.5f);
      if (score < 0.0f) return 0.0f;
      if (score > 100.0f) return 100.0f;
      return score;
    update_interval: 30s
  - platform: template
    name: "Sleep Noise Floor"
    id: sleep_noise_floor
    unit_of_measurement: "dB"
    accuracy_decimals: 1
    icon: "mdi:ear-hearing"
    lambda: |-
      return id(sleep_noise_floor_db);
    update_interval: 10s
  - platform: template
    name: "Sleep Effective Threshold"
    id: sleep_effective_threshold
    unit_of_measurement: "dB"
    accuracy_decimals: 1
    icon: "mdi:tune"
    lambda: |-
      float threshold = id(sleep_noise_threshold).state;
      if (id(sleep_adaptive_threshold).state && id(sleep_noise_floor_initialized)) {
        const float adaptive_threshold = id(sleep_noise_floor_db) + id(sleep_adaptive_margin).state;
        if (adaptive_threshold > threshold) {
          threshold = adaptive_threshold;
        }
      }
      return threshold;
    update_interval: 10s
text:
  - platform: template
