esp32:
  board: seeed_xiao_esp32s3
  framework:
    type: arduino
# Enable logging
logger:
#  level: VERY_VERBOSE
#  logs:
#    microphone: VERY_VERBOSE
#    i2s_audio: VERY_VERBOSE
# Enable Home Assistant API
api:
  encryption:
    key: "lY+oz71tYyiQ8XgimOxMd6pYEyWhLzzXqhNYsZatTmw="
  services: # for playing music via Home Assistant
    - service: play_song
      variables:
        song_data: string
      then:
        - lambda: |-
            auto *bz = id(buzzer_pwm);
            std::string s = song_data;
            size_t start = 0;

            while (true) {
              size_t comma = s.find(',', start);
              std::string note = s.substr(start, comma - start);
              if (note.empty()) break;

              size_t colon = note.find(':');
              if (colon != std::string::npos) {
                int freq = atoi(note.substr(0, colon).c_str());
                int dur  = atoi(note.substr(colon + 1).c_str());

                if (freq > 0) {
                  // ✅ 正确写法
                  bz->update_frequency(freq);
                  bz->set_level(0.6);
                } else {
                  bz->set_level(0);
                }
                delay(dur);
              }

              if (comma == std::string::npos) break;
              start = comma + 1;
            }

            bz->set_level(0);
    - service: start_sleep_monitoring
      then:
        - switch.turn_on: sleep_monitoring
        - lambda: |-
            id(sleep_noise_event_count) = 0;
            id(sleep_noise_total_ms) = 0;
            id(sleep_noise_started_ms) = millis();
            id(sleep_noise_active) = false;
            id(sleep_noise_floor_initialized) = false;
            id(sleep_noise_floor_db) = 0.0f;
        - logger.log: "Sleep monitoring started"
    - service: stop_sleep_monitoring
      then:
        - switch.turn_off: sleep_monitoring
        - lambda: |-
            if (id(sleep_noise_active)) {
              id(sleep_noise_total_ms) += millis() - id(sleep_noise_started_ms);
              id(sleep_noise_active) = false;
            }
        - logger.log: "Sleep monitoring stopped"
    - service: reset_sleep_monitoring
      then:
        - lambda: |-
            id(sleep_noise_event_count) = 0;
            id(sleep_noise_total_ms) = 0;
            id(sleep_noise_started_ms) = millis();
            id(sleep_noise_active) = false;
            id(sleep_noise_floor_initialized) = false;
            id(sleep_noise_floor_db) = 0.0f;
        - logger.log: "Sleep monitoring reset"
