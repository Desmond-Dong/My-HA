    mode: TEXT
    # 这里你可以填入你想给第二页预设的默认地址
    initial_value: "http://172.16.1.119:10000/lovelace/4?viewport=800x480&eink=2&format=bmp&lang=zh-cn"
    optimistic: true
    restore_value: true
    max_length: 255
