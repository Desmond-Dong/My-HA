external_components:
  - source: github://dmoo500/esphome-tab5-v2-sendspin@main
    components: [st7123]
    refresh: 1d

esphome:
  name: tab5-display-test-rot0
  friendly_name: Tab5 Display Test Rot0

esp32:
  board: esp32-p4-evboard
  variant: esp32p4
  flash_size: 16MB
  engineering_sample: true
  framework:
    type: esp-idf
    advanced:
      enable_idf_experimental_features: true

esp32_hosted:
  variant: esp32c6
  active_high: true
  clk_pin: GPIO12
  cmd_pin: GPIO13
  d0_pin: GPIO11
  d1_pin: GPIO10
  d2_pin: GPIO9
  d3_pin: GPIO8
  reset_pin: GPIO15
  slot: 1

logger:
  hardware_uart: USB_SERIAL_JTAG

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

api:
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome

mdns:

psram:
  mode: hex
  speed: 200MHz

i2c:
  - id: bsp_bus
    sda: GPIO31
    scl: GPIO32
    frequency: 400kHz

esp_ldo:
  - voltage: 2.5V
    channel: 3

pi4ioe5v6408:
  - id: pi4ioe1
    address: 0x43
  - id: pi4ioe2
    address: 0x44

output:
  - platform: ledc
    pin: GPIO22
    id: backlight_pwm
    frequency: 1000Hz

light:
  - platform: monochromatic
    output: backlight_pwm
    id: backlight
    name: Display Backlight
    restore_mode: RESTORE_DEFAULT_ON

display:
  - platform: mipi_dsi
    dimensions:
      height: 1280
      width: 720
    model: M5STACK-TAB5-V2
    rotation: 0
    reset_pin:
      pi4ioe5v6408: pi4ioe1
      number: 4
    pixel_mode: 16bit
    color_order: RGB
    show_test_card: true

touchscreen:
  - platform: st7123
    interrupt_pin: GPIO23
    reset_pin:
      pi4ioe5v6408: pi4ioe1
      number: 5
    update_interval: never
    calibration:
      x_min: 0
      x_max: 720
      y_min: 0
      y_max: 1280
    id: touch
    on_touch:
      - logger.log: "touch detected"

binary_sensor:
  - platform: gpio
    id: headphone_detect
    name: Headphone Detect
    pin:
      pi4ioe5v6408: pi4ioe1
      number: 7

switch:
  - platform: gpio
    id: speaker_enable
    name: Speaker Enable
    pin:
      pi4ioe5v6408: pi4ioe1
      number: 1
    restore_mode: ALWAYS_ON
  - platform: gpio
    id: wifi_power
    name: WiFi Power
    pin:
      pi4ioe5v6408: pi4ioe2
      number: 0
    restore_mode: ALWAYS_ON
