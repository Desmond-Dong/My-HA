esphome:
  name: grove_vision_ai_example
  friendly_name: Grove Vision AI V2

esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: arduino

# PSRAM configuration for ESP32-S3 (required for video streaming)
psram:
  mode: octal
  speed: 80MHz

# Enable logging
logger:
  level: DEBUG

# Enable logging
logger:
  level: DEBUG

# Enable Home Assistant API
api:
  encryption:
    key: "your_encryption_key_here"

ota:
  password: "your_ota_password_here"

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

# Grove Vision AI V2 Component
external_components:
  - source:
      type: local
      path: ./grove_vision_ai
    components: [ grove_vision_ai ]

# UART configuration for Grove Vision AI V2
uart:
  - id: uart_bus
    tx_pin: GPIO17
    rx_pin: GPIO18
    baud_rate: 921600
    rx_buffer_size: 32768

# Grove Vision AI V2 main component
grove_vision_ai:
  id: vision_ai
  update_interval: 500ms

# Web server for video streaming
web_server:
  port: 80
  auth:
    username: admin
    password: !secret web_server_password

# Video stream component (ESP32-S3 only)
video_stream:
  port: 8080

# Sensor for detection count
sensor:
  - platform: grove_vision_ai
    name: "Detection Count"
    id: detection_count_sensor
    # This sensor will be updated by the component automatically

# Binary sensor for motion detection (any object)
binary_sensor:
  - platform: grove_vision_ai
    name: "Motion Detected"
    id: motion_sensor
    min_confidence: 0.6

  - platform: grove_vision_ai
    name: "Person Detected"
    id: person_sensor
    target_id: 0  # Assuming person is class ID 0
    min_confidence: 0.7

# Text sensor for detection results
text_sensor:
  - platform: grove_vision_ai
    name: "Detection Results"
    id: detection_results_text

# Automations triggered by detections
automation:
  - alias: "Send notification on person detection"
    trigger:
      - platform: grove_vision_ai
        on_detection:
          target_id: 0  # Person
          min_confidence: 0.7
    action:
      - service: notify.mobile_app
        data:
          title: "Person Detected!"
          message: "A person was detected with confidence"

  - alias: "Turn on light when motion detected"
    trigger:
      - platform: grove_vision_ai
        on_detection:
          min_confidence: 0.6
    action:
      - service: switch.turn_on
        target:
          entity_id: switch.living_room_light

