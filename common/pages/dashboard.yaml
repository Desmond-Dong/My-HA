# Dashboard Page
lvgl:
  pages:
    - id: dashboard_page
      widgets:
        - obj:
            styles: content_container
            widgets:
              - label:
                  id: time_label
                  text_font: montserrat_96
                  text: "00:00:00"
                  align: CENTER
                  y: -100
              - label:
                  id: date_label2
                  text_font: montserrat_32
                  text: "1970-01-01 Thu"
                  align: CENTER
                  y: 30
              - obj:
                  width: 800
                  height: 200
                  bg_opa: TRANSP
                  border_opa: TRANSP
                  align: CENTER
                  y: 200
                  layout:
                    type: GRID
                    grid_columns: [FR(20), FR(30), FR(20), FR(30)]
                    grid_rows: [FR(1), FR(1)]
                    pad_row: 24
                    pad_column: 24
                  widgets:
                    - label:
                        text_font: extra_icon
                        text: "\U000F050F"
                        grid_cell_column_pos: 0 
                        grid_cell_row_pos: 0 
                        grid_cell_x_align: CENTER
                        grid_cell_y_align: CENTER
                    - label:
                        id: temp_label
                        text_font: montserrat_32
                        text: "-"
                        grid_cell_column_pos: 1 
                        grid_cell_row_pos: 0 
                        grid_cell_x_align: START
                        grid_cell_y_align: CENTER
                    - label:
                        text_font: extra_icon
                        text: "\U000F058E"
                        grid_cell_column_pos: 2 
                        grid_cell_row_pos: 0 
                        grid_cell_x_align: CENTER
                        grid_cell_y_align: CENTER
                    - label:
                        text_font: montserrat_32
                        id: humi_label
                        text: "-"
                        grid_cell_column_pos: 3 
                        grid_cell_row_pos: 0 
                        grid_cell_x_align: START
                        grid_cell_y_align: CENTER
        - label:
            x: 220
            y: 40
            text_font: montserrat_48
            text: "Dashboard"
