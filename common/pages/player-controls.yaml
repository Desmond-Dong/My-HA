# Player Controls Page
lvgl:
  pages:
    - id: player_controls_page
      bg_color: 0x000000
      widgets:
        - obj:
            align: CENTER
            width: 1280
            height: 720
            bg_opa: TRANSP
            border_opa: TRANSP
            clickable: true
            on_click:
              - lvgl.widget.show: sidebars
              - script.execute: nav_rail_update
              - lambda: |-
                  switch (id(page_num)) {
                    case 0:
                      lv_obj_send_event(id(dash_panel_btn), LV_EVENT_PRESSED, NULL);
                      break;
                    case 1:
                      lv_obj_send_event(id(light_panel_btn), LV_EVENT_PRESSED, NULL);
                      break;
                    case 2:
                      lv_obj_send_event(id(climate_panel_btn), LV_EVENT_PRESSED, NULL);
                      break;
                    default:
                      break;
                  }

        - image:
            id: controls_album_art_widget
            align: CENTER
            x: 0
            y: 0
            src: fallback_playing_image1
            width: ${imagewidth}
            height: ${imageheight}
            antialias: false
            clickable: false

        - label:
            id: controls_title_label
            align: TOP_MID
            x: 0
            y: 30
            width: 560
            text: ""
            text_color: 0xFFFFFF
            text_font: font_cjk_28
            long_mode: SCROLL_CIRCULAR
            text_align: CENTER
            bg_opa: TRANSP
            border_opa: TRANSP
            hidden: true

        - label:
            id: controls_artist_label
            align: TOP_MID
            x: 0
            y: 60
            width: 560
            text: ""
            text_color: 0x66CCFF
            text_font: font_display
            long_mode: SCROLL_CIRCULAR
            text_align: CENTER
            bg_opa: TRANSP
            border_opa: TRANSP
            hidden: true

        - obj:
            align: RIGHT_MID
            x: -12
            y: 0
            width: 90
            height: 560
            bg_opa: TRANSP
            border_opa: TRANSP
            scrollable: false
            layout:
              type: FLEX
              flex_flow: COLUMN
              flex_align_main: CENTER
              flex_align_cross: CENTER
              flex_align_track: CENTER
              pad_row: 10
            widgets:
              - button:
                  id: controls_previous_button
                  width: 72
                  height: 72
                  radius: 36
                  bg_color: 0x202020
                  bg_opa: 85%
                  border_color: 0x505050
                  border_width: 1
                  pressed:
                    bg_color: 0x66CCFF
                    bg_opa: COVER
                    border_color: 0xFFFFFF
                    border_width: 3
                  on_click:
                    - script.execute: player_controls_previous
                  widgets:
                    - label:
                        align: CENTER
                        text: "\U000F04AE"
                        text_color: 0xFFFFFF
                        text_font: font_mdi_controls

              - button:
                  id: controls_toggle_button
                  width: 80
                  height: 80
                  radius: 40
                  bg_color: 0x202020
                  bg_opa: 85%
                  border_color: 0x505050
                  border_width: 1
                  pressed:
                    bg_color: 0x66CCFF
                    bg_opa: COVER
                    border_color: 0xFFFFFF
                    border_width: 3
                  on_click:
                    - script.execute: player_controls_toggle
                  widgets:
                    - label:
                        align: CENTER
                        text: "\U000F040E"
                        text_color: 0xFFFFFF
                        text_font: font_mdi_controls

              - button:
                  id: controls_next_button
                  width: 72
                  height: 72
                  radius: 36
                  bg_color: 0x202020
                  bg_opa: 85%
                  border_color: 0x505050
                  border_width: 1
                  pressed:
                    bg_color: 0x66CCFF
                    bg_opa: COVER
                    border_color: 0xFFFFFF
                    border_width: 3
                  on_click:
                    - script.execute: player_controls_next
                  widgets:
                    - label:
                        align: CENTER
                        text: "\U000F04AD"
                        text_color: 0xFFFFFF
                        text_font: font_mdi_controls

              - button:
                  id: controls_volume_down_button
                  width: 72
                  height: 72
                  radius: 36
                  bg_color: 0x202020
                  bg_opa: 85%
                  border_color: 0x505050
                  border_width: 1
                  pressed:
                    bg_color: 0x66CCFF
                    bg_opa: COVER
                    border_color: 0xFFFFFF
                    border_width: 3
                  on_click:
                    - script.execute: player_controls_volume_down
                  on_long_press_repeat:
                    - script.execute: player_controls_volume_down
                  widgets:
                    - label:
                        align: CENTER
                        text: "\U000F075E"
                        text_color: 0xFFFFFF
                        text_font: font_mdi_controls

              - button:
                  id: controls_mute_button
                  width: 72
                  height: 72
                  radius: 36
                  bg_color: 0x202020
                  bg_opa: 85%
                  border_color: 0x505050
                  border_width: 1
                  pressed:
                    bg_color: 0x66CCFF
                    bg_opa: COVER
                    border_color: 0xFFFFFF
                    border_width: 3
                  on_click:
                    - script.execute: player_controls_mute
                  widgets:
                    - label:
                        id: controls_mute_icon
                        align: CENTER
                        text: "\U000F04C3"
                        text_color: 0xFFFFFF
                        text_font: font_mdi_controls

              - button:
                  id: controls_volume_up_button
                  width: 72
                  height: 72
                  radius: 36
                  bg_color: 0x202020
                  bg_opa: 85%
                  border_color: 0x505050
                  border_width: 1
                  pressed:
                    bg_color: 0x66CCFF
                    bg_opa: COVER
                    border_color: 0xFFFFFF
                    border_width: 3
                  on_click:
                    - script.execute: player_controls_volume_up
                  on_long_press_repeat:
                    - script.execute: player_controls_volume_up
                  widgets:
                    - label:
                        align: CENTER
                        text: "\U000F075D"
                        text_color: 0xFFFFFF
                        text_font: font_mdi_controls
