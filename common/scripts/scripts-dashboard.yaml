# Dashboard Scripts: Timer Display and Sound Effects
script:
  - id: refresh_timer_display
    mode: restart
    then:
      - lambda: |-
          static constexpr int TIMER_SEGMENTS = 144;
          bool found = false;
          int left = 0;
          int total = 0;
          
          id(timer_is_active) = found;
          id(timer_seconds_left) = found ? left : 0;
          id(timer_total_seconds) = found && total > 0 ? total : 0;

          if (id(timer_progress_arc) == nullptr) {
            id(timer_progress_arc) = lv_obj_create(lv_layer_top());
            lv_obj_remove_style_all(id(timer_progress_arc));
            lv_obj_set_size(id(timer_progress_arc), ${screenwidth}, ${screenheight});
            lv_obj_center(id(timer_progress_arc));
            lv_obj_clear_flag(id(timer_progress_arc), LV_OBJ_FLAG_CLICKABLE);
            lv_obj_clear_flag(id(timer_progress_arc), LV_OBJ_FLAG_SCROLLABLE);

            const float cx = ${screenwidth} / 2.0f;
            const float cy = ${screenheight} / 2.0f;
            const float radius = 169.0f;
            for (int i = 0; i < TIMER_SEGMENTS; i++) {
              const float angle = (-90.0f + (360.0f * i / TIMER_SEGMENTS)) * (float) M_PI / 180.0f;
              lv_obj_t *seg = lv_obj_create(id(timer_progress_arc));
              lv_obj_remove_style_all(seg);
              lv_obj_set_size(seg, 6, 6);
              lv_obj_set_style_radius(seg, LV_RADIUS_CIRCLE, 0);
              lv_obj_set_style_bg_opa(seg, LV_OPA_COVER, 0);
              lv_obj_set_pos(seg, (int) lroundf(cx + cosf(angle) * radius - 3.0f),
                             (int) lroundf(cy + sinf(angle) * radius - 3.0f));
              lv_obj_clear_flag(seg, LV_OBJ_FLAG_CLICKABLE);
              lv_obj_clear_flag(seg, LV_OBJ_FLAG_SCROLLABLE);
            }
          }

          if (id(timer_progress_label) == nullptr) {
            id(timer_progress_label) = lv_label_create(lv_layer_top());
            lv_obj_set_width(id(timer_progress_label), 180);
            lv_obj_align(id(timer_progress_label), LV_ALIGN_TOP_MID, 0, 6);
            lv_obj_set_style_text_align(id(timer_progress_label), LV_TEXT_ALIGN_CENTER, 0);
            lv_obj_set_style_text_color(id(timer_progress_label), lv_color_hex(0xFFFFFF), 0);
            lv_obj_set_style_text_font(id(timer_progress_label), id(font_date), 0);
            lv_obj_add_flag(id(timer_progress_label), LV_OBJ_FLAG_HIDDEN);
          }

          if (!found || total <= 0) {
            lv_obj_add_flag(id(timer_progress_arc), LV_OBJ_FLAG_HIDDEN);
            lv_obj_add_flag(id(timer_progress_label), LV_OBJ_FLAG_HIDDEN);
            lv_obj_add_flag(id(idle_timer_block), LV_OBJ_FLAG_HIDDEN);
            lv_obj_clear_flag(id(idle_center_block), LV_OBJ_FLAG_HIDDEN);
            if (id(standby_background_enabled).state) {
              lv_obj_clear_flag(id(standby_background_widget), LV_OBJ_FLAG_HIDDEN);
            }
            return;
          }

          int active_segments = (int) lroundf((float) left * (float) TIMER_SEGMENTS / (float) total);
          active_segments = std::max(0, std::min(TIMER_SEGMENTS, active_segments));
          for (int i = 0; i < TIMER_SEGMENTS; i++) {
            lv_obj_t *seg = lv_obj_get_child(id(timer_progress_arc), i);
            if (seg == nullptr) continue;
            const bool active = i < active_segments;
            lv_obj_set_style_bg_color(seg, active ? lv_color_hex(0xFFFFFF) : lv_color_hex(0x242424), 0);
            lv_obj_set_style_bg_opa(seg, active ? LV_OPA_COVER : 115, 0);
          }
          lv_obj_clear_flag(id(timer_progress_arc), LV_OBJ_FLAG_HIDDEN);
          lv_obj_move_foreground(id(timer_progress_arc));
          lv_obj_add_flag(id(timer_progress_label), LV_OBJ_FLAG_HIDDEN);

          char text[16];
          if (left >= 3600) {
            snprintf(text, sizeof(text), "%d:%02d:%02d", left / 3600, (left / 60) % 60, left % 60);
          } else {
            snprintf(text, sizeof(text), "%d:%02d", left / 60, left % 60);
          }
          lv_label_set_text(id(idle_timer_countdown), text);


  - id: ring_timer
    then:
      - script.execute: enable_repeat_one
      - script.execute:
          id: play_sound
          priority: true
          sound_file: "timer_finished_sound"

  - id: enable_repeat_one
    then:
      - media_player.repeat_one:
          id: external_media_player
          announcement: true
      - speaker_source.set_playlist_delay:
          id: external_media_player
          pipeline: announcement
          delay: 500ms

  - id: disable_repeat
    then:
      - media_player.repeat_off:
          id: external_media_player
          announcement: true
      - speaker_source.set_playlist_delay:
          id: external_media_player
          pipeline: announcement
          delay: 0ms

  - id: play_sound
    parameters:
      priority: bool
      sound_file: string
    then:
      - if:
          condition:
            lambda: 'return sound_file == "ready_sound";'
          then:
            - lambda: 'id(boot_announce_active) = true;'

      - if:
          condition:
            lambda: return priority;
          then:
            - media_player.stop:
                id: external_media_player
                announcement: true

      - lambda: |-
          if ((id(external_media_player).state != media_player::MediaPlayerState::MEDIA_PLAYER_STATE_ANNOUNCING) || priority) {
            id(external_media_player)
              ->make_call()
              .set_media_url("audio-file://" + sound_file)
              .set_announcement(true)
              .perform();
          }

