
script:
  - id: expand_nav_btn_click_area
    # Expand the clickable area for the main navigation buttons so
    # that touches near the icons are also registered. This improves
    # usability of the side navigation rail on small touch targets.
    then:
      - lambda: |-
          std::vector<lv_obj_t*> btns = {
            id(dash_panel_btn),
            id(light_panel_btn),
            id(climate_panel_btn),
            id(media_panel_btn)
          };
          for (auto* btn : btns) {
            lv_obj_set_ext_click_area(btn, 180);
          }
  - id: nav_rail_update
    # Update the navigation rail UI to reflect the current page
    # selection. This sets the checked state on the correct nav button,
    # updates the icon to the active/inactive glyph, and applies the
    # appropriate label style (active/inactive color).
    then:
      - lambda: |-
          const int active = id(page_num);
          lv_obj_t* buttons[] = { 
              id(dash_panel_btn), 
              id(light_panel_btn), 
              id(climate_panel_btn),
              id(media_panel_btn)
          };
          lv_obj_t* icons[] = { 
              id(dash_btn_icon), 
              id(light_btn_icon), 
              id(climate_btn_icon),
              id(media_btn_icon)
          };
          lv_obj_t* labels[] = { 
              id(dash_btn_label), 
              id(light_btn_label), 
              id(climate_btn_label),
              id(media_btn_label)
          };
          const char* icon_unchecked[] = {
              "\U000F0A1D", // dashboard-outline
              "\U000F0336", // lightbulb-outline
              "\U000F0F55", // thermometer-outline
              "\U000F040A"  // play-circle-outline
          };
          const char* icon_checked[] = {
              "\U000F056E", // dashboard
              "\U000F0335", // lightbulb
              "\U000F0F54", // thermometer
              "\U000F040C"  // play-circle (filled)
          };

          const int count = sizeof(buttons) / sizeof(buttons[0]);
          
          // Update button UI
          for (int i = 0; i < count; i++) {
              if (i == id(page_num)) {
                lv_obj_add_state(buttons[i], LV_STATE_CHECKED);
              } else {
                lv_obj_clear_state(buttons[i], LV_STATE_CHECKED);
              }
              bool selected = (i == active);
              lv_obj_add_style(labels[i], selected ? id(nav_label_activate) : id(nav_label_inactivate), LV_PART_MAIN);
              lv_label_set_text(icons[i], selected ? icon_checked[i] : icon_unchecked[i]);
          }
    
  # The below script was used to sync home assistant
  # entity states with our LVGL UI when UI is drawn on screen.
  - id: sync_ha
    then:
      - logger.log: "Sync with Home Assistant"

  # This script was used to draw a custom 'indicator' on color palette
  # It used a canvas and allow us to fill pixels with different color
  - id: draw_color_palette
    # Draw a circular HSV color wheel on the canvas widget.
    # This lambda computes hue from angle and saturation from distance
    # to center, converts HSV to RGB and sets each canvas pixel.
    then:
      - lambda: |-
          const int W = 320;
          const int H = 320;
          const int cx = W / 2;
          const int cy = H / 2;
          const int radius = 160;

          auto canvas = id(color_palette_canvas);

          // HSV to RGB helper
          auto hsv_to_rgb = [](float h, float s, float v) -> lv_color_t {
            float r, g, b;

            int i = (int)(h / 60.0f) % 6;
            float f = h / 60.0f - i;
            float p = v * (1.0f - s);
            float q = v * (1.0f - f * s);
            float t = v * (1.0f - (1.0f - f) * s);

            switch (i) {
              case 0: r=v; g=t; b=p; break;
              case 1: r=q; g=v; b=p; break;
              case 2: r=p; g=v; b=t; break;
              case 3: r=p; g=q; b=v; break;
              case 4: r=t; g=p; b=v; break;
              case 5: r=v; g=p; b=q; break;
            }

            uint8_t R = (uint8_t)(r * 255);
            uint8_t G = (uint8_t)(g * 255);
            uint8_t B = (uint8_t)(b * 255);

            return lv_color_make(R, G, B);
          };

          // Draw HSV color wheel
          for (int y = 0; y < H; y++) {
            for (int x = 0; x < W; x++) {

              int dx = x - cx;
              int dy = y - cy;
              int dist2 = dx*dx + dy*dy;

              if (dist2 > radius * radius) continue;

              float angle = atan2f(dy, dx);  // -π ~ π
              float hue = fmodf((angle + M_PI) * 180.0f / M_PI + 180.0f, 360.0f);

              float dist = sqrtf(dist2);  // 0 ~ 160
              float sat = dist / radius;  // 0.0 ~ 1.0

              float val = 1.0f;  // fixed brightness

              lv_color_t c = hsv_to_rgb(hue, sat, val);
              lv_canvas_set_px(canvas, x, y, c, LV_OPA_COVER);
            }
          };
  # This script was used to draw a custom 'indicator' on color palette
  # using the object widget
  # and calculate the selected color with positions
  # meanwhile 
  # 1. setting the background color of the object
  # 2. store the r, g, b value separately in global variables
  - id: draw_color_palette_indicator
    # Make the small draggable indicator respond to touch/move
    # events on the color palette. The callback computes the indicator
    # position, clamps it to the palette radius, converts the (x,y)
    # position to an HSV color, converts HSV to RGB and then updates
    # the indicator background and global RGB variables for use when
    # sending the selected color to Home Assistant.
    then:
      - lambda: |-
          lv_obj_add_event_cb(id(color_palette_indicator), [](lv_event_t * e){
            lv_obj_t * obj = (lv_obj_t*) lv_event_get_target(e);

            lv_indev_t * indev = lv_indev_get_act();
            if(indev == NULL)  return;

            lv_point_t vect;
            lv_indev_get_vect(indev, &vect);

            lv_coord_t x = lv_obj_get_x_aligned(obj) + vect.x;
            lv_coord_t y = lv_obj_get_y_aligned(obj) + vect.y;

            int radius = 160;

            float angle = atan2f(y, x);

            if( x * x + y * y > radius * radius ){
                x = cosf(angle) * radius;
                y = sinf(angle) * radius;
            }

            float hue, saturation, dist, value;

            hue = angle * 180.0f / M_PI;

            if (hue < 0) hue += 360.0f;

            dist = sqrtf( x * x + y * y );

            saturation = dist / radius;

            if (saturation > 1) saturation = 1;

            value = 1.0f;

            auto hsv_to_rgb888 = [](float h, float s, float v,
              uint8_t &r, uint8_t &g, uint8_t &b){
                float c = v * s;
                float h_prime = h / 60.0f;
                float x = c * (1 - fabsf(fmodf(h_prime, 2) - 1));
                float m = v - c;

                float r1=0, g1=0, b1=0;
                if(h_prime >=0 && h_prime <1){ r1=c; g1=x; b1=0; }
                else if(h_prime >=1 && h_prime <2){ r1=x; g1=c; b1=0; }
                else if(h_prime >=2 && h_prime <3){ r1=0; g1=c; b1=x; }
                else if(h_prime >=3 && h_prime <4){ r1=0; g1=x; b1=c; }
                else if(h_prime >=4 && h_prime <5){ r1=x; g1=0; b1=c; }
                else{ r1=c; g1=0; b1=x; }

                r = (uint8_t)((r1 + m) * 255);
                g = (uint8_t)((g1 + m) * 255);
                b = (uint8_t)((b1 + m) * 255);
            };

            uint8_t r, g, b;
            hsv_to_rgb888(hue, saturation, value, r, g, b);

            lv_color_t update_color = lv_color_make(r, g, b);

            lv_obj_set_pos(obj, x, y);

            // Set the indicator's background color
            lv_obj_set_style_bg_color(obj, update_color, LV_STATE_DEFAULT);

            // Give the slider proper color like in the Home Assistant
            float brightness = 0.299 * r + 0.587 * g + 0.114 * b;

            // If it's too close to white, we use gray for substitution
            if (brightness > 235) {
                lv_obj_set_style_bg_color(id(light_slider), lv_color_hex(0xE1E1E1), LV_PART_INDICATOR);
                lv_obj_set_style_bg_color(id(light_slider), lv_color_hex(0xF9F9F9), LV_PART_MAIN);
            } else {
              lv_obj_set_style_bg_color(id(light_slider), update_color, LV_PART_INDICATOR);
              // a fade background
              float factor = 0.85;
              uint8_t bg_r = r + (255 - r) * factor;
              uint8_t bg_g = g + (255 - g) * factor;
              uint8_t bg_b = b + (255 - b) * factor;
              lv_color_t bar_bg = lv_color_make(bg_r, bg_g, bg_b);
              lv_obj_set_style_bg_color(id(light_slider), bar_bg, LV_PART_MAIN);
            }

            // Set the current light color
            id(light_r) = r;
            id(light_g) = g;
            id(light_b) = b;

          }, LV_EVENT_PRESSING, NULL);
    

  - id: move_color_palette_indicator
    # Brief: Move color palette indicator script
    # This script reads the current input device touch coordinates and computes
    # the local position relative to the color canvas. It clamps the position
    # inside the circular palette radius, converts the position to HSV
    # (hue/saturation) and then to RGB, updates the indicator position and
    # its background color, and stores the resulting R/G/B values into global
    # variables for use when sending the selected color to Home Assistant.
    then:
      - lambda: |-
          lv_indev_t * indev = lv_indev_get_act();
          if(indev == NULL)  return;

          lv_point_t p;
          lv_indev_get_point(indev, &p);

          lv_area_t area;
          lv_obj_get_coords(id(color_palette_canvas), &area);
          
          int radius = 160;

          int local_x = p.x - area.x1 - radius;
          int local_y = p.y - area.y1 - radius;

          float angle = atan2f(local_y, local_x);

          // restrict the click area inside the circle
          if ( local_x * local_x + local_y * local_y > radius * radius ) {
              local_x = cosf(angle) * radius;
              local_y = sinf(angle) * radius;
          }

          float hue, saturation, dist, value;

          hue = angle * 180.0f / M_PI;

          if (hue < 0) hue += 360.0f;

          dist = sqrtf( local_x * local_x + local_y * local_y );

          saturation = dist / radius;

          if (saturation > 1) saturation = 1;

          value = 1.0f;

          auto hsv_to_rgb888 = [](float h, float s, float v,
            uint8_t &r, uint8_t &g, uint8_t &b){
              float c = v * s;
              float h_prime = h / 60.0f;
              float x = c * (1 - fabsf(fmodf(h_prime, 2) - 1));
              float m = v - c;

              float r1=0, g1=0, b1=0;
              if(h_prime >=0 && h_prime <1){ r1=c; g1=x; b1=0; }
              else if(h_prime >=1 && h_prime <2){ r1=x; g1=c; b1=0; }
              else if(h_prime >=2 && h_prime <3){ r1=0; g1=c; b1=x; }
              else if(h_prime >=3 && h_prime <4){ r1=0; g1=x; b1=c; }
              else if(h_prime >=4 && h_prime <5){ r1=x; g1=0; b1=c; }
              else{ r1=c; g1=0; b1=x; }

              r = (uint8_t)((r1 + m) * 255);
              g = (uint8_t)((g1 + m) * 255);
              b = (uint8_t)((b1 + m) * 255);
          };

          uint8_t r, g, b;
          hsv_to_rgb888(hue, saturation, value, r, g, b);

          lv_color_t update_color = lv_color_make(r, g, b);

          lv_obj_set_pos(id(color_palette_indicator), local_x, local_y);

          lv_obj_set_style_bg_color(id(color_palette_indicator), update_color, LV_STATE_DEFAULT);

          // Give the slider proper color like in the Home Assistant
          float brightness = 0.299 * r + 0.587 * g + 0.114 * b;

          // If it's too close to white, we use gray for subsititution
          if (brightness > 235) {
              lv_obj_set_style_bg_color(id(light_slider), lv_color_hex(0xE1E1E1), LV_PART_INDICATOR);
              lv_obj_set_style_bg_color(id(light_slider), lv_color_hex(0xF9F9F9), LV_PART_MAIN);
          } else {
            lv_obj_set_style_bg_color(id(light_slider), update_color, LV_PART_INDICATOR);
            // a fade background
            float factor = 0.85;
            uint8_t bg_r = r + (255 - r) * factor;
            uint8_t bg_g = g + (255 - g) * factor;
            uint8_t bg_b = b + (255 - b) * factor;
            lv_color_t bar_bg = lv_color_make(bg_r, bg_g, bg_b);
            lv_obj_set_style_bg_color(id(light_slider), bar_bg, LV_PART_MAIN);
          }
          

          // Set the current light color
          id(light_r) = r;
          id(light_g) = g;
          id(light_b) = b;

  - id: sync_ha_palette
    parameters:
      color_str: string
    then:
      - lambda: |-
          ESP_LOGD("sync_ha_palette", "Received color string: %s", color_str.c_str());
          
          if (color_str.empty() || color_str == "None" 
              || color_str == "null" || color_str == "unknown" 
              || color_str == "unavailable" ) {
            ESP_LOGD("sync_ha_palette", "Color unavailable, resetting to white");
            lv_obj_set_pos(id(color_palette_indicator), 0, 0);
            lv_obj_set_style_bg_color(id(color_palette_indicator), lv_color_hex(0xFFFFFF), LV_STATE_DEFAULT);
            lv_obj_set_style_bg_color(id(light_slider), lv_color_hex(0xECECEC), LV_PART_MAIN);
            return;
          }
          
          int r = 255, g = 255, b = 255;
          
          // Try parsing formats: "(r, g, b)" or "[r, g, b]" or "r, g, b"
          std::string clean = color_str;
          // Remove brackets and parentheses
          clean.erase(std::remove(clean.begin(), clean.end(), '('), clean.end());
          clean.erase(std::remove(clean.begin(), clean.end(), ')'), clean.end());
          clean.erase(std::remove(clean.begin(), clean.end(), '['), clean.end());
          clean.erase(std::remove(clean.begin(), clean.end(), ']'), clean.end());
          
          // Try parsing "r, g, b" format
          if (sscanf(clean.c_str(), "%d, %d, %d", &r, &g, &b) == 3 ||
              sscanf(clean.c_str(), "%d,%d,%d", &r, &g, &b) == 3) {
            ESP_LOGD("sync_ha_palette", "Parsed RGB: %d, %d, %d", r, g, b);
            
            // Clamp values to 0-255
            r = std::max(0, std::min(255, r));
            g = std::max(0, std::min(255, g));
            b = std::max(0, std::min(255, b));
            
            lv_color_t update_color = lv_color_make(r, g, b);
            lv_color_hsv_t hsv = lv_color_rgb_to_hsv(r, g, b);
            int radius = 160;

            float rad = hsv.h * M_PI / 180.0f;
            float s = hsv.s / 100.0f;

            int x = (int)(cosf(rad) * s * radius);
            int y = (int)(sinf(rad) * s * radius);

            lv_obj_set_pos(id(color_palette_indicator), x, y);
            lv_obj_set_style_bg_color(id(color_palette_indicator), update_color, LV_STATE_DEFAULT);
            
            // Give the slider proper color like in Home Assistant
            float brightness = 0.299 * r + 0.587 * g + 0.114 * b;

            // If it's too close to white, we use gray for substitution
            if (brightness > 235) {
                lv_obj_set_style_bg_color(id(light_slider), lv_color_hex(0xE1E1E1), LV_PART_INDICATOR);
                lv_obj_set_style_bg_color(id(light_slider), lv_color_hex(0xF9F9F9), LV_PART_MAIN);
            } else {
              lv_obj_set_style_bg_color(id(light_slider), update_color, LV_PART_INDICATOR);
              // a fade background
              float factor = 0.85;
              uint8_t bg_r = r + (255 - r) * factor;
              uint8_t bg_g = g + (255 - g) * factor;
              uint8_t bg_b = b + (255 - b) * factor;
              lv_color_t bar_bg = lv_color_make(bg_r, bg_g, bg_b);
              lv_obj_set_style_bg_color(id(light_slider), bar_bg, LV_PART_MAIN);
            }

            id(light_r) = r;
            id(light_g) = g;
            id(light_b) = b;
            
            ESP_LOGD("sync_ha_palette", "Color palette synced successfully");
          } else {
            ESP_LOGW("sync_ha_palette", "Failed to parse color string: %s", clean.c_str());
          }

  - id: update_arc_color
    parameters:
      ac_mode_index: int
    then:
      - lambda: |-
          switch ( ac_mode_index ) {
            /* Heat/Cool */
            case 0:
              lv_obj_set_style_arc_color(id(ac_arc), lv_color_hex(0xFAE19D), LV_PART_MAIN);
              lv_obj_set_style_arc_color(id(ac_arc), lv_color_hex(0xFAE19D), LV_PART_INDICATOR);
              lv_obj_set_style_outline_color(id(ac_arc), lv_color_hex(0xF5C23B), LV_PART_KNOB);
              break;
            /* Heat */
            case 1:
              lv_obj_set_style_arc_color(id(ac_arc), lv_color_hex(0xEBEBEB), LV_PART_MAIN);
              lv_obj_set_style_arc_color(id(ac_arc), lv_color_hex(0xEC7636), LV_PART_INDICATOR);
              lv_obj_set_style_outline_color(id(ac_arc), lv_color_hex(0xEC7636), LV_PART_KNOB);
              break;
            /* Cool */
            case 2:
              lv_obj_set_style_arc_color(id(ac_arc), lv_color_hex(0x4C96EE), LV_PART_MAIN);
              lv_obj_set_style_arc_color(id(ac_arc), lv_color_hex(0xEBEBEB), LV_PART_INDICATOR);
              lv_obj_set_style_outline_color(id(ac_arc), lv_color_hex(0x4C96EE), LV_PART_KNOB);
              break;
            /* Dry */
            case 3:
              lv_obj_set_style_arc_color(id(ac_arc), lv_color_hex(0xF7CD98), LV_PART_MAIN);
              lv_obj_set_style_arc_color(id(ac_arc), lv_color_hex(0xF7CD98), LV_PART_INDICATOR);
              lv_obj_set_style_outline_color(id(ac_arc), lv_color_hex(0xF09C31), LV_PART_KNOB);
              break;
            /* Fan */
            case 4:
              lv_obj_set_style_arc_color(id(ac_arc), lv_color_hex(0xABDDE8), LV_PART_MAIN);
              lv_obj_set_style_arc_color(id(ac_arc), lv_color_hex(0xABDDE8), LV_PART_INDICATOR);
              lv_obj_set_style_outline_color(id(ac_arc), lv_color_hex(0x58BAD2), LV_PART_KNOB);
              break;
            /* Off */
            case 5:
            /* fallthrough */
            default:
              lv_obj_set_style_arc_color(id(ac_arc), lv_color_hex(0xEBEBEB), LV_PART_MAIN);
              lv_obj_set_style_arc_color(id(ac_arc), lv_color_hex(0xEBEBEB), LV_PART_INDICATOR);
              lv_obj_set_style_outline_color(id(ac_arc), lv_color_hex(0x9E9E9E), LV_PART_KNOB);
              break;
          }
  # This script was used on dropdown widget
  # to set ac state (ON/OFF/COOL/HEAT, etc)
  - id: set_ac_state
    parameters:
      ac_mode_idx: int
    then:
      - homeassistant.action:
          action: climate.set_hvac_mode
          data:
            entity_id: ${climate_entity}
            hvac_mode: !lambda return id(hvac_state_table)[ac_mode_idx];
  - id: set_ac_fan_mode
    parameters:
      ac_fan_mode_idx: int
    then:
      - homeassistant.action:
          action: climate.set_fan_mode
          data:
            entity_id: ${climate_entity}
            fan_mode: !lambda return id(fan_modes_table)[ac_fan_mode_idx];
  # This script was used on spinbox/arc widget
  # to set the temperature to climate entity
  # it doesn't turn on/off, use the dropdown instead
  - id: set_ac_temp
    parameters:
      temp_value: float
    then:
      - homeassistant.action:
          action: climate.set_temperature
          data:
            entity_id: ${climate_entity}
            temperature: !lambda return temp_value;

# sendspin script
  - id: apply_accent_color_debounced
    mode: restart
    then:
      - delay: 40ms
      - script.execute: apply_accent_color

  - id: apply_accent_color
    mode: restart
    then:
      - lambda: |-
          const int r = std::max(0, std::min(255, id(accent_red)));
          const int g = std::max(0, std::min(255, id(accent_green)));
          const int b = std::max(0, std::min(255, id(accent_blue)));
          const uint32_t accent_u32 = ((uint32_t) r << 16) | ((uint32_t) g << 8) | (uint32_t) b;
          const uint32_t dark_u32 = ((uint32_t) (r / 10) << 16) | ((uint32_t) (g / 10) << 8) | (uint32_t) (b / 10);
          const lv_color_t accent = lv_color_hex(accent_u32);
          const lv_color_t accent_dark = lv_color_hex(dark_u32);

          lv_obj_set_style_text_color(id(clock_label), accent, 0);
          lv_obj_set_style_text_color(id(idle_timer_countdown), accent, 0);
          lv_obj_set_style_bg_color(id(controls_toggle_button), accent, 0);
          lv_obj_set_style_border_color(id(controls_toggle_button), accent, LV_STATE_PRESSED);
          lv_obj_set_style_border_color(id(volume_feedback_box), accent, 0);

  - id: set_ui_phase
    mode: restart
    parameters:
      phase: int
    then:
      - script.stop: player_controls_timeout
      - lambda: |-
          id(ui_phase) = phase;
      - script.execute: standby_screen_activity
      - if:
          condition:
            lambda: 'return phase == ${ui_phase_standby};'
          then:
            - lvgl.page.show: idle_page
      - if:
          condition:
            lambda: 'return phase == ${ui_phase_player_controls};'
          then:
            - lvgl.page.show: player_controls_page
            - script.execute: player_controls_timeout
      - if:
          condition:
            lambda: 'return phase == ${ui_phase_now_playing};'
          then:
            - lvgl.page.show: sendspin_page

  - id: player_controls_timeout
    mode: restart
    then:
      - delay: !lambda |-
          return (uint32_t) (id(player_controls_timeout_seconds).state * 1000.0f);
      - if:
          condition:
            media_player.is_idle: external_media_player
          then:
            - script.execute:
                id: set_ui_phase
                phase: ${ui_phase_standby}
          else:
            - script.execute:
                id: set_ui_phase
                phase: ${ui_phase_now_playing}


  - id: load_standby_background
    mode: restart
    then:
      - online_image.set_url:
          id: standby_background_image
          url: !lambda |-
            return "https://raw.githubusercontent.com/RealDeco/xiaozhi-esphome/main/images/Other/360x360/" + id(standby_background_choice).current_option().str() + ".png";

  - id: standby_screen_activity
    mode: restart
    then:
      - script.stop: standby_screen_timeout
      - if:
          condition:
            lambda: 'return id(screen_timeout_dimmed);'
          then:
            - light.turn_on:
                id: Sled
                brightness: !lambda 'return id(preferred_screen_brightness);'
            - lambda: |-
                id(screen_timeout_dimmed) = false;
      - if:
          condition:
            and:
              - switch.is_on: standby_screen_timeout_enabled
              - lambda: 'return id(ui_phase) == ${ui_phase_standby};'
              - lambda: 'return !id(timer_is_active);'
          then:
            - script.execute: standby_screen_timeout

  - id: standby_screen_timeout
    mode: restart
    then:
      - delay: !lambda |-
          return (uint32_t) (id(standby_screen_timeout_seconds).state * 1000.0f / 3.0f);
      - if:
          condition:
            and:
              - switch.is_on: standby_screen_timeout_enabled
              - lambda: 'return id(ui_phase) == ${ui_phase_standby};'
              - lambda: 'return !id(timer_is_active);'
          then:
            - lambda: |-
                id(preferred_screen_brightness) = id(Sled).remote_values.get_brightness();
                id(screen_timeout_dimmed) = true;
            - light.turn_on:
                id: Sled
                brightness: !lambda 'return id(preferred_screen_brightness) * 0.60f;'
          else:
            - script.stop: standby_screen_timeout
      - delay: !lambda |-
          return (uint32_t) (id(standby_screen_timeout_seconds).state * 1000.0f / 3.0f);
      - if:
          condition:
            and:
              - switch.is_on: standby_screen_timeout_enabled
              - lambda: 'return id(ui_phase) == ${ui_phase_standby};'
              - lambda: 'return !id(timer_is_active);'
          then:
            - light.turn_on:
                id: Sled
                brightness: !lambda 'return id(preferred_screen_brightness) * 0.25f;'
          else:
            - script.stop: standby_screen_timeout
      - delay: !lambda |-
          return (uint32_t) (id(standby_screen_timeout_seconds).state * 1000.0f / 3.0f);
      - if:
          condition:
            and:
              - switch.is_on: standby_screen_timeout_enabled
              - lambda: 'return id(ui_phase) == ${ui_phase_standby};'
              - lambda: 'return !id(timer_is_active);'
          then:
            - light.turn_off: Sled

  - id: now_playing_swipe_left
    then:
      - script.execute:
          id: album_art_slide
          direction: -1
      - media_player.next: sendspin_group_media_player

  - id: now_playing_swipe_right
    then:
      - script.execute:
          id: album_art_slide
          direction: 1
      - media_player.previous: sendspin_group_media_player

  - id: now_playing_swipe_up
    then:
      - media_player.volume_up: external_media_player
      - script.execute:
          id: show_volume_feedback
          text: "+5"

  - id: now_playing_swipe_down
    then:
      - media_player.volume_down: external_media_player
      - script.execute:
          id: show_volume_feedback
          text: "-5"

  - id: player_controls_keep_open
    then:
      - script.execute:
          id: set_ui_phase
          phase: ${ui_phase_player_controls}

  - id: player_controls_toggle
    then:
      - delay: 75ms
      - if:
          condition:
            lambda: 'return !id(touch_swipe_detected);'
          then:
            - media_player.toggle: sendspin_group_media_player
            - script.execute:
                id: set_ui_phase
                phase: ${ui_phase_now_playing}

  - id: player_controls_swipe_previous
    then:
      - script.execute:
          id: player_controls_slide_to_now_playing
          direction: 1
      - media_player.previous: sendspin_group_media_player

  - id: player_controls_swipe_next
    then:
      - script.execute:
          id: player_controls_slide_to_now_playing
          direction: -1
      - media_player.next: sendspin_group_media_player

  - id: player_controls_previous
    then:
      - delay: 75ms
      - if:
          condition:
            lambda: 'return !id(touch_swipe_detected);'
          then:
            - media_player.previous: sendspin_group_media_player
            - script.execute: player_controls_keep_open

  - id: player_controls_next
    then:
      - delay: 75ms
      - if:
          condition:
            lambda: 'return !id(touch_swipe_detected);'
          then:
            - media_player.next: sendspin_group_media_player
            - script.execute: player_controls_keep_open

  - id: player_controls_volume_down
    then:
      - delay: 75ms
      - if:
          condition:
            lambda: 'return !id(touch_swipe_detected);'
          then:
            - media_player.volume_down: external_media_player
            - script.execute: player_controls_keep_open

  - id: player_controls_volume_up
    then:
      - delay: 75ms
      - if:
          condition:
            lambda: 'return !id(touch_swipe_detected);'
          then:
            - media_player.volume_up: external_media_player
            - script.execute: player_controls_keep_open

  - id: player_controls_mute
    then:
      - delay: 75ms
      - if:
          condition:
            lambda: 'return !id(touch_swipe_detected);'
          then:
            - if:
                condition:
                  lambda: 'return id(is_muted);'
                then:
                  - media_player.unmute: external_media_player
                  - lambda: 'id(is_muted) = false;'
                  - lvgl.label.update:
                      id: controls_mute_icon
                      text: "\U000F075D"  # volume-high icon
                else:
                  - media_player.mute: external_media_player
                  - lambda: 'id(is_muted) = true;'
                  - lvgl.label.update:
                      id: controls_mute_icon
                      text: "\U000F075F"  # volume-off icon
            - script.execute: player_controls_keep_open

  - id: player_controls_slide_to_now_playing
    mode: restart
    parameters:
      direction: int
    then:
      - script.stop: player_controls_timeout
      - lambda: |-
          id(ui_phase) = ${ui_phase_now_playing};
      - lvgl.page.show: sendspin_page
      - script.execute:
          id: album_art_slide
          direction: !lambda return direction;

  - id: album_art_slide
    mode: restart
    parameters:
      direction: int
    then:
      - script.stop: album_art_fade_cleanup
      - lambda: |-
          id(album_art_slide_active) = true;
          id(sendspin_album_art_valid) = false;
          lv_obj_t *current_art = id(album_art_widget);
          lv_obj_t *incoming_art = id(album_art_transition_widget);
          lv_anim_del(current_art, nullptr);
          lv_anim_del(incoming_art, nullptr);
          lv_img_set_src(incoming_art, id(fallback_playing_image1));
          lv_obj_set_x(current_art, 0);
          lv_obj_set_x(incoming_art, -direction * ${screenwidth});
          lv_obj_set_style_img_opa(current_art, LV_OPA_COVER, 0);
          lv_obj_set_style_img_opa(incoming_art, LV_OPA_COVER, 0);
          lv_obj_clear_flag(incoming_art, LV_OBJ_FLAG_HIDDEN);

          lv_anim_t current_slide;
          lv_anim_init(&current_slide);
          lv_anim_set_var(&current_slide, current_art);
          lv_anim_set_values(&current_slide, 0, direction * ${screenwidth});
          lv_anim_set_time(&current_slide, 300);
          lv_anim_set_exec_cb(&current_slide, [](void *obj, int32_t x) {
            lv_obj_set_x((lv_obj_t *) obj, x);
          });
          lv_anim_start(&current_slide);

          lv_anim_t incoming_slide;
          lv_anim_init(&incoming_slide);
          lv_anim_set_var(&incoming_slide, incoming_art);
          lv_anim_set_values(&incoming_slide, -direction * ${screenwidth}, 0);
          lv_anim_set_time(&incoming_slide, 300);
          lv_anim_set_exec_cb(&incoming_slide, [](void *obj, int32_t x) {
            lv_obj_set_x((lv_obj_t *) obj, x);
          });
          lv_anim_start(&incoming_slide);
      - delay: 300ms
      - lambda: |-
          lv_obj_t *current_art = id(album_art_widget);
          lv_obj_t *incoming_art = id(album_art_transition_widget);
          lv_img_set_src(current_art, id(fallback_playing_image1));
          lv_obj_set_x(current_art, 0);
          lv_obj_set_style_img_opa(current_art, LV_OPA_COVER, 0);
          lv_obj_add_flag(incoming_art, LV_OBJ_FLAG_HIDDEN);
          lv_obj_set_x(incoming_art, 0);
          id(album_art_slide_active) = false;
      - if:
          condition:
            lambda: 'return id(sendspin_album_art_valid);'
          then:
            - script.execute: album_art_apply_decoded

  - id: album_art_apply_decoded
    mode: restart
    then:
      - script.stop: album_art_fade_cleanup
      - lambda: |-
          lv_obj_t *now_playing_art = id(album_art_widget);
          lv_obj_t *transition_art = id(album_art_transition_widget);
          lv_obj_t *controls_art = id(controls_album_art_widget);
          lv_img_set_src(controls_art, id(sendspin_album_art));
          lv_img_set_zoom(controls_art, LV_ZOOM_NONE);

          if (id(ui_phase) == ${ui_phase_now_playing}) {
            lv_anim_del(transition_art, nullptr);
            lv_img_set_src(transition_art, id(sendspin_album_art));
            lv_img_set_zoom(transition_art, LV_ZOOM_NONE);
            lv_obj_set_x(transition_art, 0);
            lv_obj_set_style_img_opa(transition_art, LV_OPA_TRANSP, 0);
            lv_obj_clear_flag(transition_art, LV_OBJ_FLAG_HIDDEN);

            lv_anim_t fade_in;
            lv_anim_init(&fade_in);
            lv_anim_set_var(&fade_in, transition_art);
            lv_anim_set_values(&fade_in, LV_OPA_TRANSP, LV_OPA_COVER);
            lv_anim_set_time(&fade_in, 300);
            lv_anim_set_exec_cb(&fade_in, [](void *obj, int32_t opacity) {
              lv_obj_set_style_img_opa((lv_obj_t *) obj, opacity, 0);
            });
            lv_anim_start(&fade_in);
          } else {
            lv_img_set_src(now_playing_art, id(sendspin_album_art));
            lv_img_set_zoom(now_playing_art, LV_ZOOM_NONE);
          }
      - if:
          condition:
            lambda: 'return id(ui_phase) == ${ui_phase_now_playing};'
          then:
            - script.execute: album_art_fade_cleanup

  - id: album_art_fade_cleanup
    mode: restart
    then:
      - delay: 320ms
      - lambda: |-
          lv_obj_t *now_playing_art = id(album_art_widget);
          lv_obj_t *transition_art = id(album_art_transition_widget);
          lv_img_set_src(now_playing_art, id(sendspin_album_art));
          lv_img_set_zoom(now_playing_art, LV_ZOOM_NONE);
          lv_obj_set_x(now_playing_art, 0);
          lv_obj_set_style_img_opa(now_playing_art, LV_OPA_COVER, 0);
          lv_obj_add_flag(transition_art, LV_OBJ_FLAG_HIDDEN);
          lv_obj_set_x(transition_art, 0);


  - id: refresh_timer_display
    mode: restart
    then:
      - lambda: |-
          static constexpr int TIMER_SEGMENTS = 144;
          bool found = false;
          int left = 0;
          int total = 0;
          
          id(timer_is_active) = found;
          id(timer_seconds_left) = found ? left : 0;
          id(timer_total_seconds) = found && total > 0 ? total : 0;

          if (id(timer_progress_arc) == nullptr) {
            id(timer_progress_arc) = lv_obj_create(lv_layer_top());
            lv_obj_remove_style_all(id(timer_progress_arc));
            lv_obj_set_size(id(timer_progress_arc), ${screenwidth}, ${screenheight});
            lv_obj_center(id(timer_progress_arc));
            lv_obj_clear_flag(id(timer_progress_arc), LV_OBJ_FLAG_CLICKABLE);
            lv_obj_clear_flag(id(timer_progress_arc), LV_OBJ_FLAG_SCROLLABLE);

            const float cx = ${screenwidth} / 2.0f;
            const float cy = ${screenheight} / 2.0f;
            const float radius = 169.0f;
            for (int i = 0; i < TIMER_SEGMENTS; i++) {
              const float angle = (-90.0f + (360.0f * i / TIMER_SEGMENTS)) * (float) M_PI / 180.0f;
              lv_obj_t *seg = lv_obj_create(id(timer_progress_arc));
              lv_obj_remove_style_all(seg);
              lv_obj_set_size(seg, 6, 6);
              lv_obj_set_style_radius(seg, LV_RADIUS_CIRCLE, 0);
              lv_obj_set_style_bg_opa(seg, LV_OPA_COVER, 0);
              lv_obj_set_pos(seg, (int) lroundf(cx + cosf(angle) * radius - 3.0f),
                             (int) lroundf(cy + sinf(angle) * radius - 3.0f));
              lv_obj_clear_flag(seg, LV_OBJ_FLAG_CLICKABLE);
              lv_obj_clear_flag(seg, LV_OBJ_FLAG_SCROLLABLE);
            }
          }

          if (id(timer_progress_label) == nullptr) {
            id(timer_progress_label) = lv_label_create(lv_layer_top());
            lv_obj_set_width(id(timer_progress_label), 180);
            lv_obj_align(id(timer_progress_label), LV_ALIGN_TOP_MID, 0, 6);
            lv_obj_set_style_text_align(id(timer_progress_label), LV_TEXT_ALIGN_CENTER, 0);
            lv_obj_set_style_text_color(id(timer_progress_label), lv_color_hex(0xFFFFFF), 0);
            lv_obj_set_style_text_font(id(timer_progress_label), id(font_date), 0);
            lv_obj_add_flag(id(timer_progress_label), LV_OBJ_FLAG_HIDDEN);
          }

          if (!found || total <= 0) {
            lv_obj_add_flag(id(timer_progress_arc), LV_OBJ_FLAG_HIDDEN);
            lv_obj_add_flag(id(timer_progress_label), LV_OBJ_FLAG_HIDDEN);
            lv_obj_add_flag(id(idle_timer_block), LV_OBJ_FLAG_HIDDEN);
            lv_obj_clear_flag(id(idle_center_block), LV_OBJ_FLAG_HIDDEN);
            if (id(standby_background_enabled).state) {
              lv_obj_clear_flag(id(standby_background_widget), LV_OBJ_FLAG_HIDDEN);
            }
            return;
          }

          int active_segments = (int) lroundf((float) left * (float) TIMER_SEGMENTS / (float) total);
          active_segments = std::max(0, std::min(TIMER_SEGMENTS, active_segments));
          for (int i = 0; i < TIMER_SEGMENTS; i++) {
            lv_obj_t *seg = lv_obj_get_child(id(timer_progress_arc), i);
            if (seg == nullptr) continue;
            const bool active = i < active_segments;
            lv_obj_set_style_bg_color(seg, active ? lv_color_hex(0xFFFFFF) : lv_color_hex(0x242424), 0);
            lv_obj_set_style_bg_opa(seg, active ? LV_OPA_COVER : 115, 0);
          }
          lv_obj_clear_flag(id(timer_progress_arc), LV_OBJ_FLAG_HIDDEN);
          lv_obj_move_foreground(id(timer_progress_arc));
          lv_obj_add_flag(id(timer_progress_label), LV_OBJ_FLAG_HIDDEN);

          char text[16];
          if (left >= 3600) {
            snprintf(text, sizeof(text), "%d:%02d:%02d", left / 3600, (left / 60) % 60, left % 60);
          } else {
            snprintf(text, sizeof(text), "%d:%02d", left / 60, left % 60);
          }
          lv_label_set_text(id(idle_timer_countdown), text);


  - id: show_volume_feedback
    mode: restart
    parameters:
      text: string
    then:
      - lambda: |-
          lv_label_set_text(id(volume_feedback_label), text.c_str());
          lv_obj_clear_flag(id(volume_feedback_box), LV_OBJ_FLAG_HIDDEN);
      - delay: 1200ms
      - lambda: |-
          lv_obj_add_flag(id(volume_feedback_box), LV_OBJ_FLAG_HIDDEN);


  - id: album_art_timeout_fallback
    mode: restart
    then:
      - delay: 500ms
      - if:
          condition:
            lambda: 'return !id(sendspin_album_art_valid);'
          then:
            - lvgl.image.update:
                id: album_art_widget
                src: fallback_playing_image1
            - lvgl.image.update:
                id: controls_album_art_widget
                src: fallback_playing_image1
            - lambda: |-
                if (!id(album_art_slide_active)) {
                  lv_obj_add_flag(id(album_art_transition_widget), LV_OBJ_FLAG_HIDDEN);
                }

  - id: mp_idle_debounce
    mode: restart
    then:
      - delay: 1200ms
      - if:
          condition:
            and:
              - media_player.is_idle: external_media_player
              - lambda: 'return id(ui_phase) != ${ui_phase_player_controls};'
          then:
            - script.execute:
                id: set_ui_phase
                phase: ${ui_phase_standby}

  - id: ring_timer
    then:
      - script.execute: enable_repeat_one
      - script.execute:
          id: play_sound
          priority: true
          sound_file: "timer_finished_sound"

  - id: enable_repeat_one
    then:
      - media_player.repeat_one:
          id: external_media_player
          announcement: true
      - speaker_source.set_playlist_delay:
          id: external_media_player
          pipeline: announcement
          delay: 500ms

  - id: disable_repeat
    then:
      - media_player.repeat_off:
          id: external_media_player
          announcement: true
      - speaker_source.set_playlist_delay:
          id: external_media_player
          pipeline: announcement
          delay: 0ms

  - id: play_sound
    parameters:
      priority: bool
      sound_file: string
    then:
      - if:
          condition:
            lambda: 'return sound_file == "ready_sound";'
          then:
            - lambda: 'id(boot_announce_active) = true;'

      - micro_wake_word.stop:
      - voice_assistant.stop:

      - if:
          condition:
            lambda: return priority;
          then:
            - media_player.stop:
                id: external_media_player
                announcement: true

      - lambda: |-
          if ((id(external_media_player).state != media_player::MediaPlayerState::MEDIA_PLAYER_STATE_ANNOUNCING) || priority) {
            id(external_media_player)
              ->make_call()
              .set_media_url("audio-file://" + sound_file)
              .set_announcement(true)
              .perform();
          }
