substitutions:
  name: tab5-ha-hmi
  friendly_name: M5Stack Tab5 Home Assistant HMI

  startup_sound_file: Home_Connected # options are: Home_Connected or Home_Connected_Male
  imagemodel: "Gwen" # options: Gwen, Alfred, etc.

  imagewidth:  "720"
  imageheight: "720"

  screenwidth:  "1280"
  screenheight: "780"

  media_sample_rate: 48000

  ui_phase_standby: "0"
  ui_phase_player_controls: "1"
  ui_phase_now_playing: "2"
  ui_phase_playlist_menu: "3"

  light_entity: light.shu_fang_deng
  climate_entity: climate.kong_diao
  temperature_sensor: sensor.reterminal_e1001_temperature
  humidity_sensor: sensor.reterminal_e1001_humidity

external_components:
  - source: github://dmoo500/esphome-tab5-v2-sendspin@main
    components: [st7123]
    refresh: 1d
  - source: github://pr#16057
    components: [generic_image, sendspin]

esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  min_version: 2026.6.0
  on_boot:
    priority: -100
    then:
      - script.execute:
          id: set_ui_phase
          phase: ${ui_phase_standby}
      - script.execute: apply_accent_color_debounced
      # Configure audio based on headphone detection state
      - delay: 500ms
      - if:
          condition:
            binary_sensor.is_on: headphone_detect
          then:
            # Headphones plugged in at boot
            - switch.turn_off: speaker_enable
            - delay: 50ms
            - select.set:
                id: es8388_dac_output_select
                option: "HEADPHONE"
            - logger.log: "Audio initialized: Headphones detected, speaker disabled"
          else:
            # No headphones at boot
            - switch.turn_on: speaker_enable
            - delay: 50ms
            - select.set:
                id: es8388_dac_output_select
                option: "LINE1"
            - logger.log: "Audio initialized: No headphones, speaker enabled"
esp32:
  board: esp32-p4-evboard
  flash_size: 16MB
  engineering_sample: true
  cpu_frequency: 360MHz
  framework:
    type: esp-idf
    advanced:
      enable_idf_experimental_features: true
    sdkconfig_options:
      CONFIG_LWIP_TCP_WND_DEFAULT: "16384"
      CONFIG_SPI_FLASH_YIELD_DURING_ERASE: "y"

packages:
  # Use local files for development - faster iteration
  globals: !include common/tab5-v2-globals.yaml
  fonts: !include common/tab5-v2-fonts.yaml
  images: !include common/tab5-v2-images.yaml
  hardware: !include common/tab5-v2-ma-hdm.yaml
  lvgl_main: !include common/lvgl-main.yaml
  # Styles and UI Components
  lvgl_styles: !include common/styles/lvgl-styles.yaml
  lvgl_sidebar: !include common/navigation/lvgl-sidebar.yaml
  # Pages
  page_dashboard: !include common/pages/dashboard.yaml
  page_light: !include common/pages/light.yaml
  page_climate: !include common/pages/climate.yaml
  page_boot_sound: !include common/pages/boot-sound.yaml
  page_idle: !include common/pages/idle.yaml
  page_player_controls: !include common/pages/player-controls.yaml
  page_sendspin: !include common/pages/sendspin.yaml
  # Scripts
  scripts_global: !include common/scripts/scripts-global.yaml
  scripts_light: !include common/scripts/scripts-light.yaml
  scripts_climate: !include common/scripts/scripts-climate.yaml
  scripts_media: !include common/scripts/scripts-media.yaml
  scripts_dashboard: !include common/scripts/scripts-dashboard.yaml

esp32_hosted:
  variant: esp32c6
  active_high: true
  clk_pin: GPIO12
  cmd_pin: GPIO13
  d0_pin: GPIO11
  d1_pin: GPIO10
  d2_pin: GPIO9
  d3_pin: GPIO8
  reset_pin: GPIO15
  slot: 1

logger:
  hardware_uart: USB_SERIAL_JTAG
  level: DEBUG
  logs:
    api.service: WARN
    i2c.idf: WARN
    mipi_dsi: DEBUG
    display: DEBUG
    lvgl: DEBUG

psram:
  mode: hex
  speed: 200MHz

api:
  on_client_connected: 
    then:
      - lvgl.widget.show: api_icon_label
  on_client_disconnected: 
    then:
      - lvgl.widget.hide: api_icon_label

ota:
  platform: esphome

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: Tab5 Fallback Hotspot
    password: !secret wifi_password

  on_connect: 
    then:
      - lvgl.widget.show: wifi_icon_label
  on_disconnect: 
    then:
      - lvgl.widget.hide: wifi_icon_label

i2c:
  - id: bsp_bus
    sda: GPIO31
    scl: GPIO32
    frequency: 400kHz

pi4ioe5v6408:
  - id: pi4ioe1
    address: 0x43
    # 0: O - wifi_antenna_int_ext
    # 1: O - speaker_enable
    # 2: O - external_5v_power
    # 3: NC
    # 4: O - lcd reset
    # 5: O - touch panel reset
    # 6: O - camera reset
    # 7: I - headphone detect
  - id: pi4ioe2
    address: 0x44
    # 0: O - wifi_power
    # 1: NC
    # 2: NC
    # 3: O - usb_5v_power
    # 4: O - poweroff pulse
    # 5: O - quick charge enable (inverted)
    # 6: I - charging status
    # 7: O - charge enable
http_request:

motion:
  - platform: bmi270
    id: bmi270_imu
    address: 0x68
    accelerometer_range: 4G
    gyroscope_range: 2000DPS

online_image:
  - id: standby_background_image
    url: https://raw.githubusercontent.com/RealDeco/xiaozhi-esphome/main/images/Other/360x360/clock.png
    format: PNG
    type: RGB565
    resize: ${imagewidth}x${imageheight}
    update_interval: never
    on_download_finished:
      - if:
          condition:
            switch.is_on: standby_background_enabled
          then:
            - lvgl.image.update:
                id: standby_background_widget
                src: standby_background_image
            - lambda: |-
                lv_obj_clear_flag(id(standby_background_widget), LV_OBJ_FLAG_HIDDEN);
switch:
  - platform: gpio
    id: wifi_power
    name: "WiFi Power"
    pin:
      pi4ioe5v6408: pi4ioe2
      number: 0
    restore_mode: ALWAYS_ON
  - platform: gpio
    id: usb_5v_power
    name: "USB Power"
    pin:
      pi4ioe5v6408: pi4ioe2
      number: 3
    restore_mode: ALWAYS_ON
  - platform: gpio
    id: quick_charge
    name: "Quick Charge"
    pin:
      pi4ioe5v6408: pi4ioe2
      number: 5
      inverted: true
  - platform: gpio
    id: charge_enable
    name: "Charge Enable"
    pin:
      pi4ioe5v6408: pi4ioe2
      number: 7
    restore_mode: ALWAYS_ON
  - platform: gpio
    id: wifi_antenna_int_ext
    pin:
      pi4ioe5v6408: pi4ioe1
      number: 0
  - platform: gpio
    id: speaker_enable
    name: "Speaker Enable"
    pin:
      pi4ioe5v6408: pi4ioe1
      number: 1
    restore_mode: ALWAYS_ON
  - platform: gpio
    id: external_5v_power
    name: "External 5V Power"
    pin:
      pi4ioe5v6408: pi4ioe1
      number: 2
    restore_mode: ALWAYS_ON
  - platform: gpio
    id: touch_panel_enable
    internal: true
    pin:
      pi4ioe5v6408: pi4ioe1
      number: 5
    restore_mode: ALWAYS_ON
  - platform: template
    id: standby_screen_timeout_enabled
    name: Standby screen timeout
    icon: "mdi:monitor-off"
    entity_category: config
    optimistic: true
    restore_mode: RESTORE_DEFAULT_ON
    on_turn_on:
      - script.execute: standby_screen_activity
    on_turn_off:
      - script.execute: standby_screen_activity

  - platform: template
    id: standby_background_enabled
    name: Standby clock background
    icon: "mdi:image-outline"
    entity_category: config
    optimistic: true
    restore_mode: RESTORE_DEFAULT_ON
    on_turn_on:
      - script.execute: load_standby_background
    on_turn_off:
      - lambda: |-
          lv_obj_add_flag(id(standby_background_widget), LV_OBJ_FLAG_HIDDEN);
      - online_image.release: standby_background_image

binary_sensor:
  - platform: gpio
    id: charging
    name: "Charging Status"
    pin:
      pi4ioe5v6408: pi4ioe2
      number: 6
      mode: INPUT_PULLDOWN
    on_press:
      - lambda: id(battery_percent).update();
    on_release:
      - lambda: id(battery_percent).update();

  - platform: gpio
    id: headphone_detect
    name: "Headphone Detect"
    pin:
      pi4ioe5v6408: pi4ioe1
      number: 7
    on_press:
      # Headphones plugged in: disable speaker, enable headphone output
      - switch.turn_off: speaker_enable
      - delay: 50ms
      - select.set:
          id: es8388_dac_output_select
          option: "HEADPHONE"
      - logger.log: "Headphones connected - speaker disabled, headphone output active"
    on_release:
      # Headphones removed: enable speaker, activate LINE1 output
      - switch.turn_on: speaker_enable
      - delay: 50ms
      - select.set:
          id: es8388_dac_output_select
          option: "LINE1"
      - logger.log: "Headphones disconnected - speaker enabled, LINE1 output active"

select:
# The DAC Output select needs to be manually 
# (or with an automation) changed to `LINE1` for the onboard speaker
  - platform: es8388
    dac_output:
      id: es8388_dac_output_select
      name: DAC Output
    adc_input_mic:
      name: ADC Input Mic

  - platform: template
    id: wifi_antenna_select
    name: "WiFi Antenna"
    options:
      - "Internal"
      - "External"
    optimistic: true
    on_value:
      - if:
          condition:
            lambda: return i == 0;
          then:
            - switch.turn_off: wifi_antenna_int_ext
          else:
            - switch.turn_on: wifi_antenna_int_ext
# sendspin media player:
  - platform: template
    id: standby_background_choice
    name: Standby clock background image
    icon: "mdi:image-multiple-outline"
    entity_category: config
    optimistic: true
    restore_value: true
    initial_option: clock
    options:
      - chip
      - clock
      - hacker
      - mission
      - starrysky
      - tron
      - waterdrops
      - waves
    set_action:
      - script.execute: standby_screen_activity
      - if:
          condition:
            switch.is_on: standby_background_enabled
          then:
            - online_image.set_url:
                id: standby_background_image
                url: !lambda |-
                  return "https://raw.githubusercontent.com/RealDeco/xiaozhi-esphome/main/images/Other/360x360/" + x + ".png";

  - platform: template  
    id: accent_color_preset
    name: Accent color preset
    icon: "mdi:palette"
    entity_category: config
    optimistic: true
    restore_value: true
    initial_option: Pitch Black
    options:
      - Pitch Black
      - Burning Red
      - Cyber Blue
    set_action:
      - if:
          condition:
            lambda: return x == "Pitch Black";
          then:
            - light.turn_on:
                id: accent_color_picker
                brightness: 100%
                red: 100%
                green: 100%
                blue: 0%
      - if:
          condition:
            lambda: return x == "Burning Red";
          then:
            - light.turn_on:
                id: accent_color_picker
                brightness: 100%
                red: 100%
                green: 0%
                blue: 0%
      - if:
          condition:
            lambda: return x == "Cyber Blue";
          then:
            - light.turn_on:
                id: accent_color_picker
                brightness: 100%
                red: 40%
                green: 80%
                blue: 100%

sensor:
  - platform: internal_temperature
    id: esp32p4_temp
    name: "ESP32-P4 Internal Temperature"
    update_interval: 60s

  - platform: bmi270
    type: temperature
    id: bmi270_temp
    name: "BMI270 Temperature"

  - platform: motion
    motion_id: bmi270_imu
    type: acceleration_x
    name: "BMI270 Accel X"

  - platform: motion
    motion_id: bmi270_imu
    type: acceleration_y
    name: "BMI270 Accel Y"

  - platform: motion
    motion_id: bmi270_imu
    type: acceleration_z
    name: "BMI270 Accel Z"

  - platform: motion
    motion_id: bmi270_imu
    type: gyroscope_x
    name: "BMI270 Gyro X"

  - platform: motion
    motion_id: bmi270_imu
    type: gyroscope_y
    name: "BMI270 Gyro Y"

  - platform: motion
    motion_id: bmi270_imu
    type: gyroscope_z
    name: "BMI270 Gyro Z"

  - platform: ina226
    address: 0x41
    adc_averaging: 16
    max_current: 8.192A
    shunt_resistance: 0.005ohm
    bus_voltage:
      id: battery_voltage
      name: Battery Voltage
    current:
      id: battery_current
      name: Battery Current
      # Positive means discharging
      # Negative means charging
  
  - platform: homeassistant
    id: cur_temp
    entity_id: ${temperature_sensor}
    on_value:
      - lvgl.label.update:
          id: temp_label
          text:
            format: "%.1f °C"
            args: [ 'x' ]
  
  - platform: homeassistant
    id: cur_humi
    entity_id: ${humidity_sensor}
    on_value:
      - lvgl.label.update:
          id: humi_label
          text:
            format: "%.1f %%"
            args: [ 'x' ]

  - platform: template
    id: battery_percent
    name: "Battery Percentage"
    unit_of_measurement: "%"
    accuracy_decimals: 0
    lambda: |-
      float voltage = id(battery_voltage).state;
      float min_voltage = 6.0;
      float max_voltage = 8.23;
      
      if (voltage < 5.0) return 0.0;

      float percent = ((voltage - min_voltage) / (max_voltage - min_voltage)) * 100.0;
      if (percent > 100.0) return 100.0;
      if (percent < 0.0) return 0.0;
      return percent;
    update_interval: 60s
    on_value:
      - lvgl.label.update:
          id: pwr_bat_icon_label
          text: !lambda |-
            float voltage = id(battery_voltage).state;
            float current = id(battery_current).state;
            bool charging_pin = id(charging).state;
            int level = int(x);
            
            // No battery detected
            if (voltage < 5.0) {
              return "\U000F06A5";  // Plug icon
            }
            
            // Determine which icon set to use based on charging status
            bool is_charging = (current < -0.1 || charging_pin);
            
            // Use level/10 to create brackets: 0-9=0, 10-19=1, 20-29=2, etc.
            int bracket = level / 10;
            
            if (is_charging) {
              // Charging icons
              switch (bracket) {
                case 10:
                case 9:
                  return "\U000F0085";  // charging-100
                case 8:
                  return "\U000F008B";  // charging-90
                case 7:
                  return "\U000F008A";  // charging-80
                case 6:
                  return "\U000F089E";  // charging-70
                case 5:
                  return "\U000F0089";  // charging-60
                case 4:
                  return "\U000F089D";  // charging-50
                case 3:
                  return "\U000F0088";  // charging-40
                case 2:
                  return "\U000F0087";  // charging-30
                case 1:
                  return "\U000F0086";  // charging-20
                default:
                  return "\U000F089C";  // charging-10
              }
            } else {
              // Regular battery icons
              switch (bracket) {
                case 10:
                case 9:
                  return "\U000F0079";  // battery-100
                case 8:
                  return "\U000F0082";  // battery-90
                case 7:
                  return "\U000F0081";  // battery-80
                case 6:
                  return "\U000F0080";  // battery-70
                case 5:
                  return "\U000F007F";  // battery-60
                case 4:
                  return "\U000F007E";  // battery-50
                case 3:
                  return "\U000F007D";  // battery-40
                case 2:
                  return "\U000F007C";  // battery-30
                case 1:
                  return "\U000F007B";  // battery-20
                default:
                  return "\U000F007A";  // battery-10
              }
            }
number:
  - platform: template
    id: player_controls_timeout_seconds
    name: Player controls timeout delay
    unit_of_measurement: "s"
    icon: "mdi:timer-outline"
    entity_category: config
    optimistic: true
    restore_value: true
    mode: box
    min_value: 1
    max_value: 60
    step: 1
    initial_value: 5
    set_action:
      - if:
          condition:
            lambda: 'return id(ui_phase) == ${ui_phase_player_controls};'
          then:
            - script.execute: player_controls_timeout

  - platform: template
    id: standby_screen_timeout_seconds
    name: Standby screen timeout delay
    unit_of_measurement: "s"
    icon: "mdi:timer-outline"
    entity_category: config
    optimistic: true
    restore_value: true
    mode: box
    min_value: 15
    max_value: 3600
    step: 5
    initial_value: 60
    set_action:
      - script.execute: standby_screen_activity

  
display:
  - platform: mipi_dsi
    id: main_display
    dimensions:
      height: 1280
      width: 720
    model: M5STACK-TAB5-V2
    pclk_frequency: 60MHz
    lane_bit_rate: 730Mbps
    reset_pin:
      pi4ioe5v6408: pi4ioe1
      number: 4
    color_depth: 16
    pixel_mode: 16bit
    color_order: RGB
    init_sequence:
      - delay 120ms
      - [0x11]
      - delay 120ms
      - [0x29]
      - delay 20ms
    update_interval: never
    auto_clear_enabled: false

touchscreen:
  - platform: st7123
    interrupt_pin: GPIO23
    update_interval: never
    calibration:
      x_min: 0
      x_max: 720
      y_min: 0
      y_max: 1280
    id: touch
    on_touch:
    - script.execute: standby_screen_activity

esp_ldo:
  - voltage: 2.5V
    channel: 3


output:
  - platform: ledc
    pin: GPIO22
    id: backlight_output
    frequency: 1000Hz

  - platform: template
    id: accent_color_r
    type: float
    write_action:
      - lambda: |-
          id(accent_red) = (int) lroundf(std::max(0.0f, std::min(1.0f, state)) * 255.0f);
      - script.execute: apply_accent_color_debounced

  - platform: template
    id: accent_color_g
    type: float
    write_action:
      - lambda: |-
          id(accent_green) = (int) lroundf(std::max(0.0f, std::min(1.0f, state)) * 255.0f);
      - script.execute: apply_accent_color_debounced

  - platform: template
    id: accent_color_b
    type: float
    write_action:
      - lambda: |-
          id(accent_blue) = (int) lroundf(std::max(0.0f, std::min(1.0f, state)) * 255.0f);
      - script.execute: apply_accent_color_debounced


light:
  - platform: monochromatic
    id: Sled
    name: Screen
    icon: mdi:television
    entity_category: config
    output: backlight_output
    restore_mode: ALWAYS_ON
    default_transition_length: 250ms
  - platform: rgb
    id: accent_color_picker
    name: Accent color
    icon: mdi:palette
    entity_category: config
    red: accent_color_r
    green: accent_color_g
    blue: accent_color_b
    restore_mode: RESTORE_DEFAULT_ON
    default_transition_length: 0s    

i2s_audio:
  - id: mic_bus
    i2s_lrclk_pin: GPIO29
    i2s_bclk_pin: GPIO27
    i2s_mclk_pin: GPIO30

audio_adc:
  - platform: es7210
    id: es7210_adc
    bits_per_sample: 16bit
    sample_rate: 16000

microphone:
  - platform: i2s_audio
    id: tab5_microphone
    i2s_din_pin: GPIO28
    sample_rate: 16000
    bits_per_sample: 16bit
    adc_type: external

audio_dac:
  - platform: es8388
    id: es8388_dac

speaker:
  - platform: i2s_audio
    id: box_speaker
    i2s_dout_pin: GPIO26
    audio_dac: es8388_dac
    dac_type: external
    channel: mono
    buffer_duration: 100ms
    bits_per_sample: 16bit
    sample_rate: 48000
  
  - platform: mixer
    id: mixing_speaker
    output_speaker: box_speaker
    num_channels: 2
    task_stack_in_psram: true
    source_speakers:
      - id: announcement_mixing_input
      - id: media_mixing_input

  - platform: resampler
    id: announcement_resampling_speaker
    output_speaker: announcement_mixing_input
    sample_rate: ${media_sample_rate}
    bits_per_sample: 16

  - platform: resampler
    id: media_resampling_speaker
    output_speaker: media_mixing_input
    sample_rate: ${media_sample_rate}
    bits_per_sample: 16

audio_file:
  - id: timer_finished_sound
    file: https://github.com/esphome/home-assistant-voice-pe/raw/dev/sounds/timer_finished.flac
  - id: ready_sound
    file: https://github.com/RealDeco/xiaozhi-esphome/raw/main/sounds/${startup_sound_file}.flac

sendspin:
  id: sendspin_hub
  task_stack_in_psram: false


media_source:
  - platform: audio_file
    id: audio_file_announcement_source
  - platform: audio_http
    id: http_announcement_source
  - platform: audio_http
    id: http_media_source
  - platform: sendspin
    id: sendspin_media_source

media_player:
  - platform: sendspin
    id: sendspin_group_media_player
    name: Sendspin Group Media Player

  - platform: speaker_source
    id: external_media_player
    name: Media Player

    announcement_pipeline:
      format: FLAC
      num_channels: 1
      sample_rate: ${media_sample_rate}
      speaker: announcement_resampling_speaker
      sources:
        - audio_file_announcement_source
        - http_announcement_source

    media_pipeline:
      format: FLAC
      num_channels: 2
      sample_rate: ${media_sample_rate}
      speaker: media_resampling_speaker
      sources:
        - http_media_source
        - sendspin_media_source
    volume_increment: 0.05
    volume_min: 0.3
    volume_max: 0.85

    on_play:
      then:
        - if:
            condition:
              microphone.is_capturing:
            then:
              - micro_wake_word.stop:
        - script.stop: mp_idle_debounce
        # Save current volume when playback starts (if not muted)
        - lambda: |-
            if (!id(is_muted) && id(external_media_player).volume > 0.0) {
              id(saved_volume) = id(external_media_player).volume;
            }
        - if:
            condition:
              lambda: 'return id(ui_phase) == ${ui_phase_player_controls};'
            then:
              - script.execute:
                  id: set_ui_phase
                  phase: ${ui_phase_player_controls}
            else:
              - script.execute:
                  id: set_ui_phase
                  phase: ${ui_phase_now_playing}

    on_announcement:
      then:
        - if:
            condition:
              lambda: 'return id(boot_announce_active);'
            then:
              - lvgl.page.show: boot_sound_page
              - delay: 2s
              - script.execute:
                  id: set_ui_phase
                  phase: !lambda 'return id(ui_phase);'
              - lambda: 'id(boot_announce_active) = false;'

    on_pause:
      then:
        - script.execute:
            id: set_ui_phase
            phase: ${ui_phase_player_controls}
        - if:
            condition:
              api.connected:
            then:
              - micro_wake_word.start:

    on_idle:
      then:
        - script.execute: mp_idle_debounce
        - if:
            condition:
              api.connected:
            then:
              - micro_wake_word.start:

micro_wake_word:
  id: mww
  models:
    - okay_nabu
    - hey_mycroft
    - hey_jarvis
  on_wake_word_detected:
    - voice_assistant.start:
        wake_word: !lambda return wake_word;

voice_assistant:
  id: va
  microphone: tab5_microphone
  media_player: external_media_player
  micro_wake_word: mww
  on_end:
    - wait_until:
        condition:
          - media_player.is_announcing:
              id: external_media_player
        timeout: 0.5s
    - wait_until:
        - and:
            - not:
                media_player.is_announcing:
                  id: external_media_player
            - not:
                speaker.is_playing:
                  id: box_speaker
    - micro_wake_word.start:
  on_client_connected:
    - micro_wake_word.start:
  on_client_disconnected:
    - micro_wake_word.stop


time:
  - platform: homeassistant
    id: ha_time
    on_time_sync:
      then:
        rx8130.write_time:
  - platform: rx8130
    id: rx8130_time
    update_interval: never
    on_time:
      # Update once ready
      - seconds: /3
        then:
          - lvgl.label.update:
              id: time_label
              text: !lambda |-
                auto t = id(ha_time).now();
                return t.strftime("%H:%M").c_str();

          - lvgl.label.update:
              id: date_label2
              text: !lambda |-
                auto t = id(ha_time).now();
                return t.strftime("%Y-%m-%d %a").c_str();

text_sensor:
  - platform: homeassistant
    id: light_state
    entity_id: ${light_entity}
    on_value:
      then:
        - lvgl.widget.update:
            id: light_btn
            state:
              checked: !lambda return x == "on";
              disabled: !lambda return ( x == "unavailable" ) or ( x == "unknown" );
        - lvgl.widget.update:
            id: light_click_area
            clickable: !lambda return !((x == "unavailable") || (x == "unknown"));
        - lvgl.label.update:
            id: light_label
            text_color: !lambda |-
              if ( x == "on" ) {
                  return lv_color_hex(0xF5C23B);
              } else {
                  return lv_color_hex(0x9E9E9E);
              }
            text: !lambda |-
                static char buf[10];
                std::string icon;
                if ( x == "on" ) {
                    icon = "\U000F18DD";
                } else {
                    icon = "\U000F18DE";
                }
                snprintf(buf, sizeof(buf), "%s", icon.c_str());
                return buf;
        - lvgl.label.update:
            id: light_status
            text: !lambda |-
                static char buf[10];
                std::string text;
                if ( x == "on" ) {
                    text = "ON";
                } 
                else if ( x == "unavailable" ||  x == "unknown" ) {
                    text = "UNKNOWN";
                }
                else {
                    text = "OFF";
                }
                snprintf(buf, sizeof(buf), "%s", text.c_str());
                return buf;

  - platform: homeassistant
    id: light_brightness
    entity_id: ${light_entity} 
    attribute: brightness
    on_value:
      - lvgl.slider.update:
          id: light_slider
          value: !lambda |-
            if (x.empty() || x == "None" || 
                x == "null" || x == "unknown" 
                || x == "unavailable") 
                return 0;

            return std::stoi(x);

      - lvgl.label.update:
          id: light_bright_label
          text: !lambda |-
            if ( x.empty() || x == "None" || x == "null" ) {
                return std::string("off");
            } 
            else if ( x == "unknown" || x == "unavailable" ) {
              return std::string("unavailable");
            }
            else {
              int percent = std::stoi(x) * 100 / 255;
              return std::to_string(percent) + " %";
            }
  
  - platform: homeassistant
    id: light_color
    entity_id: ${light_entity} 
    attribute: rgb_color
    on_value:
      - lambda: id(sync_ha_palette)->execute(x);
  
  - platform: homeassistant
    id: ac_temp
    entity_id: ${climate_entity}
    attribute: temperature
    on_value:
      - lvgl.spinbox.update:
          id: temp_spin_box
          value: !lambda |-
            return std::stof(x) * 10;
      - lvgl.arc.update:
          id: ac_arc
          value: !lambda |-
            return std::stof(x) * 10;
      - lvgl.label.update:
          id: ac_temp_label
          text:
            format: "%.1f °C"
            args: [ 'std::stof(x)' ]
  
